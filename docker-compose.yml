services:
  db:
    image: postgres:16-alpine
    container_name: promo-margem-db
    environment:
      POSTGRES_DB: promo_margem
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d promo_margem"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build: ./backend
    container_name: promo-margem-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/promo_margem
      TZ: America/Sao_Paulo
      # Cinto-e-suspensórios: o código já força BRT via app.utils.tz.hoje_brt(),
      # então TZ aqui é redundante mas alinha logs/timestamps do uvicorn.
      # CORS_ORIGINS: customize via env (default cobre localhost:3000 e :5173)
      # OPENROUTER_API_KEY: opcional, ativa sugestões IA
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Usa python puro pra evitar dependência de curl/wget na imagem slim
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: promo-margem-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
