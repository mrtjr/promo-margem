services:
  db:
    image: postgres:16-alpine
    container_name: promo-margem-db
    environment:
      POSTGRES_DB: promo_margem
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: promo-margem-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/promo_margem
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: promo-margem-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
