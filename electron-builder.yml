appId: com.mrtjr.promomargem
productName: PromoMargem
copyright: "Copyright (c) 2026 mrtjr"

directories:
  output: dist
  buildResources: build

files:
  - "out/**/*"
  - "package.json"
  - "!**/*.{md,map,ts}"
  - "!**/{.DS_Store,Thumbs.db}"

extraResources:
  - from: resources/backend
    to: backend
    filter:
      - "**/*"

asar: true
asarUnpack:
  - "resources/backend/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  # icon: build/icon.ico   # TODO: criar build/icon.ico (256x256). Sem isso usa o icone Electron default.
  artifactName: "PromoMargem-Setup-${version}.${ext}"
  publisherName: "PromoMargem"
  # Pula rcedit/signing — evita baixar/extrair winCodeSign-2.6.0.7z, que
  # contem symlinks dylib (darwin) que o 7za nao consegue criar no Windows
  # sem Developer Mode/admin. Custo: o .exe nao tem icone/manifesto custom
  # editado pelo rcedit, mas instala e roda. Reativar quando habilitar
  # Developer Mode no Windows ou quando assinar de fato com certificado.
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: PromoMargem
  uninstallDisplayName: PromoMargem
  # installerIcon: build/icon.ico
  # uninstallerIcon: build/icon.ico
  deleteAppDataOnUninstall: false

publish:
  - provider: github
    owner: mrtjr
    repo: promomargem-desktop
    private: true
    releaseType: release

generateUpdatesFilesForAllChannels: true
